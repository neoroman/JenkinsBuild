name: ShellCheck

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck (minimum severity error)
        env:
          SHELLCHECK_SEVERITY: error
        run: bash scripts/run-shellcheck.sh
