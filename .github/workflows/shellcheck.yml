name: ShellCheck

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck (minimum severity error)
        env:
          SHELLCHECK_SEVERITY: error
        run: bash scripts/run-shellcheck.sh

      - name: Validate test/config.json (JSON Schema)
        run: |
          python3 -m pip install --quiet jsonschema
          bash scripts/validate-config.sh test/config.json

      - name: Unit tests (pure vercomp via bash)
        run: python3 scripts/test_pure_vercomp.py -v
